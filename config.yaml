server:
  port: 1279
  mode: release  # debug, release, test

database:
  # Connection pool settings (0 = auto-detect based on CPU cores)
  # Auto-detection: max_open_conns = min(NumCPU, 50), max_idle_conns = max_open_conns/2
  # Manual override: set to specific values (e.g., 10, 20)
  max_open_conns: 0  # 0 = auto (recommended), or set manually
  max_idle_conns: 0  # 0 = auto (recommended), or set manually

rate_limit:
  enabled: true
  # Global IP limiter for all routes.
  requests_per_second: 10
  burst: 20
  # Short-cycle limiter for API-Key endpoints. It runs before auth, so 429 does not consume daily quota.
  api_key_requests_per_second: 2
  api_key_burst: 5

abuse_protection:
  enabled: true
  # Auto-block repeated 401/429 failures in a short window.
  auto_block_enabled: true
  failure_threshold: 20
  window_seconds: 60
  block_minutes: 60

api_auth:
  enabled: false
  admin_token: ""  # Set API_ADMIN_TOKEN in production
  default_daily_limit: 1000

qanlo:
  # QanloAPI only. Customers create a local API key, then bind/recharge through Qanlo Agent Key.
  agent_base_url: "https://qanlo.com"
  openai_base_url: "https://qanlo.com/v1"
  recharge_url: "https://qanlo.com/purchase?compact=1&from=agent_key&tab=recharge&ui_mode=embedded"
  agent_app_id: ""  # Set QANLO_AGENT_APP_ID in production
  agent_name: "chinese-poetry-api"
  agent_model: "deepseek-v4-flash"
  return_url: "http://localhost:1279/api/v1/billing/qanlo/callback"
  callback_secret: ""  # Optional: set QANLO_CALLBACK_SECRET to protect callback

image:
  # Image generation gateway defaults. Users provide their own Qanlo image key in the console page.
  api_key: ""  # Deprecated: server-side site-wide image keys are not used.
  base_url: "https://qanlo.com/openai/v1"
  model: "gpt-image-2"
  quality: "high"
  output_format: "png"
  timeout_seconds: 180
  storage_dir: "data/media-assets"
  public_base_path: "/media-assets"
  credit_cost: 1
  initial_credits: 20

audio:
  # Recitation/music generation gateway defaults. Users may provide their own key per request.
  api_key: ""
  base_url: "https://qanlo.com/openai/v1"
  model: "gpt-4o-mini-tts"
  voice: "alloy"
  output_format: "mp3"
  timeout_seconds: 180
  credit_cost: 1
  music_credit_cost: 0
  initial_credits: 20

graphql:
  playground: false  # Enable GraphQL Playground (set to true for development)
  introspection: true
  complexity_limit: 1000
  requests_per_second: 10
  burst: 20
  by_ip: true

search:
  max_results: 1000
  default_page_size: 20
